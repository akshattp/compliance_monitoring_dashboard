<!-- Top Navigation -->
<nav class="sticky top-0 w-full z-50 bg-white border-b border-slate-200 shadow-sm">
  <div class="flex flex-col md:flex-row justify-between items-center w-full px-6 py-3 gap-4">
    <div class="flex items-center gap-4 shrink-0">
      <img src="assets/logo.jpg" alt="GlobalPay Logo" class="h-8 w-auto object-contain">
    </div>
    
    <div class="hidden md:flex items-center gap-1 overflow-x-auto whitespace-nowrap custom-scrollbar flex-1 px-4">
      <a routerLink="/home" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">Home</a>
      <a routerLink="/transaction-summary" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">Summary</a>
      <a routerLink="/tour-operator" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">Tour Operator</a>
      <a routerLink="/retail-high-value" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">Retail High Value</a>
      <a routerLink="/high-risk-corporate" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">High Risk Corporate</a>
      <a routerLink="/fatf" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">FATF</a>
      <a routerLink="/transaction-monitoring" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">Monitoring</a>
      <a routerLink="/agent-analysis" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">Agent Insights</a>
      <a routerLink="/passenger-analysis" routerLinkActive="active-pill" class="nav-link text-sm font-semibold text-slate-600 px-4 py-2 rounded-full transition-all duration-300 hover:bg-slate-100 whitespace-nowrap">PAX Insights</a>
    </div>
    
    <div class="flex items-center shrink-0 gap-4">
      <div class="relative hidden lg:block">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
        <input class="pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-56" placeholder="Search parameters..." type="text"/>
      </div>
      <div class="text-xs font-semibold px-3 py-1.5 rounded-full flex items-center gap-2 whitespace-nowrap shadow-sm border border-slate-100" 
           [class.bg-green-50]="backendStatus() === 'connected'" [class.text-green-700]="backendStatus() === 'connected'"
           [class.bg-red-50]="backendStatus() === 'offline'" [class.text-red-700]="backendStatus() === 'offline'"
           [class.bg-gray-50]="backendStatus() === 'checking'" [class.text-gray-700]="backendStatus() === 'checking'">
        <div class="w-2 h-2 rounded-full"
             [class.bg-green-500]="backendStatus() === 'connected'"
             [class.bg-red-500]="backendStatus() === 'offline'"
             [class.bg-gray-400]="backendStatus() === 'checking'"></div>
        @if(backendStatus() === 'connected') { Connected }
        @else if (backendStatus() === 'offline') { Offline }
        @else { Checking... }
      </div>
    </div>
  </div>
</nav>

<div class="flex min-h-[calc(100vh-73px)] bg-slate-50 relative">
  <!-- Sidebar -->
  <app-sidebar #sidebar></app-sidebar>

  <!-- Main Content Area -->
  <main class="flex-1 w-full transition-all duration-300 px-8 py-8" [class.ml-[280px]]="!sidebar.isCollapsed">
    <router-outlet></router-outlet>
  </main>
</div>
