<div class="flex items-center justify-between mb-2">
  <div class="flex-1">
    <div class="relative w-64" *ngIf="data && data.length > 0">
      <span class="material-symbols-outlined absolute left-2.5 top-1/2 -translate-y-1/2 text-muted text-sm" style="font-size: 16px; color: #94a3b8;">search</span>
      <input type="text" placeholder="Search in table..." class="pl-8 pr-4 py-1.5 w-full bg-white border border-border-base rounded text-[13px] focus:outline-none focus:border-primary" (input)="onSearch($event)">
    </div>
  </div>
  <div class="flex gap-2">
    <button *ngIf="showDownload" (click)="downloadCSV()" class="flex items-center gap-1.5 bg-white hover:bg-surface-container-low text-[#334155] border border-[#e2e8f0] rounded-[6px] px-3 py-1.5 text-xs font-semibold cursor-pointer transition-colors shadow-sm">
      <span class="material-symbols-outlined" style="font-size: 16px;">download</span>
      CSV
    </button>
  </div>
</div>

<div class="w-full border border-border-base rounded-lg overflow-hidden bg-white shadow-sm relative" [ngStyle]="{'height': maxHeight}">
  <!-- AG Grid Implementation -->
  <ag-grid-angular
    *ngIf="!customRowTemplate"
    style="width: 100%; height: 100%;"
    [class]="themeClass"
    [rowData]="data"
    [columnDefs]="agColumns"
    [defaultColDef]="defaultColDef"
    [rowSelection]="'multiple'"
    [animateRows]="true"
    (gridReady)="onGridReady($event)">
  </ag-grid-angular>

  <!-- Fallback to standard HTML Table -->
  <div *ngIf="customRowTemplate" class="w-full h-full overflow-auto">
    <table class="w-full border-collapse text-[11px]">
      <thead class="bg-surface-container-lowest border-b border-border-base">
        <tr>
          <th *ngFor="let col of columns; let last = last" 
              class="p-3 font-medium text-secondary"
              [ngClass]="{'border-r border-border-base': !last}"
              [ngStyle]="{'text-align': col.align || 'left'}">
            {{ col.header }}
          </th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngFor="let row of data; let i = index">
          <ng-container *ngTemplateOutlet="customRowTemplate; context: { $implicit: row, index: i }"></ng-container>
        </ng-container>
      </tbody>
    </table>
  </div>
</div>

<!-- Footer for totals -->
<div *ngIf="data && data.length > 0" class="mt-2 flex flex-wrap gap-x-8 gap-y-2 px-4 py-3 bg-[#f8fafc] border border-border-base rounded-lg text-[13px] font-bold text-slate-800 shadow-sm">
  <div class="flex items-center">
    <span class="text-slate-500 font-medium mr-2">Total Records:</span> 
    <span>{{ totalRecords | number }}</span>
  </div>
  <ng-container *ngFor="let total of numericTotals">
    <div class="flex items-center">
      <span class="text-slate-500 font-medium mr-2">Total {{ total.header }}:</span>
      <span>{{ total.value }}</span>
    </div>
  </ng-container>
</div>
