<div class="upload-container">
  <div class="upload-header">
    <h2>Data Upload (Testing Mode)</h2>
    <div class="mock-toggle">
      <label class="switch">
        <input type="checkbox" [checked]="dataService.isMockMode()" (change)="toggleMockMode()">
        <span class="slider round"></span>
      </label>
      <span class="toggle-label">MOCK MODE</span>
    </div>
  </div>

  <div class="upload-area" 
       [class.dragover]="isDragging"
       (dragover)="onDragOver($event)" 
       (dragleave)="onDragLeave($event)" 
       (drop)="onDrop($event)">
    
    <div class="upload-content" *ngIf="!dataService.currentFile() || dataService.isUploading()">
      <div class="icon">📄</div>
      <p>Drag and drop your dataset here</p>
      <p class="subtitle">Accepted formats: .xlsx, .xls, .csv</p>
      
      <input type="file" #fileInput (change)="onFileSelected($event)" accept=".xlsx, .xls, .csv" style="display: none">
      <button class="browse-btn" (click)="fileInput.click()">Browse File</button>
    </div>

    <div class="upload-success" *ngIf="dataService.currentFile() && !dataService.isUploading()">
      <div class="icon success">✅</div>
      <p class="filename">{{ dataService.currentFile()?.name }}</p>
      <p class="status">{{ dataService.uploadStatus() }}</p>
      <div class="stats">
        <span class="badge">Rows processed: {{ dataService.rowCount() | number }}</span>
      </div>
      
      <input type="file" #fileInputReplace (change)="onFileSelected($event)" accept=".xlsx, .xls, .csv" style="display: none">
      <button class="replace-btn" (click)="fileInputReplace.click()">Upload Another File</button>
    </div>

    <div class="uploading-state" *ngIf="dataService.isUploading()">
      <div class="spinner"></div>
      <p>{{ dataService.uploadStatus() }}</p>
    </div>
  </div>
</div>
