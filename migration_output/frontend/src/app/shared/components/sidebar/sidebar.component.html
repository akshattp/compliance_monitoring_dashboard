<aside class="fixed left-0 top-[73px] h-[calc(100vh-73px)] w-[280px] bg-surface-container-low dark:bg-surface-container border-r border-border-base dark:border-outline-variant flex flex-col py-xl px-md z-40 transition-all duration-300" [class.-translate-x-full]="isCollapsed">
  
  <div class="mb-xl px-xs relative">
    <!-- Collapse Toggle -->
    <button (click)="toggleSidebar()" class="absolute -right-4 top-2 bg-white border border-border-base rounded-full p-1 shadow-sm hover:bg-surface-container-low z-50">
      <span class="material-symbols-outlined text-[16px]">chevron_left</span>
    </button>
  </div>
  <div class="flex-1 overflow-y-auto custom-scrollbar space-y-lg px-xs" *ngIf="dataService.rawDf().length > 0">
    
    <!-- Dataset Status -->
    <div class="space-y-sm bg-white p-3 rounded-lg border border-border-base shadow-sm">
      <label class="flex items-center gap-xs font-kpi-label text-kpi-label uppercase">
        <span class="material-symbols-outlined text-[18px]">analytics</span>
        Dataset Status
      </label>
      <div class="flex justify-between items-center text-sm">
        <span class="text-secondary">Source Rows:</span>
        <span class="font-bold">{{ dataService.rawDf().length | number }}</span>
      </div>
      <div class="flex justify-between items-center text-sm">
        <span class="text-secondary">Current Filtered:</span>
        <span class="font-bold text-primary">{{ dataService.filteredDf().length | number }}</span>
      </div>
    </div>

    <!-- Date Range -->
    <div class="space-y-sm">
      <label class="flex items-center gap-xs font-kpi-label text-kpi-label uppercase">
        <span class="material-symbols-outlined text-[18px]">calendar_today</span>
        Date Range
      </label>
      <div class="space-y-xs">
        <input type="date" [(ngModel)]="selectedStartDate" class="w-full bg-white border border-border-base rounded-lg px-sm py-xs text-body-main"/>
        <input type="date" [(ngModel)]="selectedEndDate" class="w-full bg-white border border-border-base rounded-lg px-sm py-xs text-body-main"/>
      </div>
    </div>
    
    <!-- FATF Status -->
    <div class="space-y-sm">
      <label class="flex items-center gap-xs font-kpi-label text-kpi-label uppercase">
        <span class="material-symbols-outlined text-[18px]">verified_user</span>
        FATF/OFAC Status
      </label>
      <div class="space-y-base">
        <label class="flex items-center gap-xs p-xs hover:bg-surface-container-highest rounded-lg cursor-pointer transition-colors">
          <input type="radio" name="ofac" value="All" [(ngModel)]="ofacStatus" class="rounded-full border-border-base text-primary focus:ring-primary"/>
          <span class="text-body-main">All Records</span>
        </label>
        <label class="flex items-center gap-xs p-xs hover:bg-surface-container-highest rounded-lg cursor-pointer transition-colors">
          <input type="radio" name="ofac" value="Flagged" [(ngModel)]="ofacStatus" class="rounded-full border-border-base text-primary focus:ring-primary"/>
          <span class="text-body-main">High Risk / Flagged</span>
        </label>
        <label class="flex items-center gap-xs p-xs hover:bg-surface-container-highest rounded-lg cursor-pointer transition-colors">
          <input type="radio" name="ofac" value="Not Flagged" [(ngModel)]="ofacStatus" class="rounded-full border-border-base text-primary focus:ring-primary"/>
          <span class="text-body-main">Not Flagged</span>
        </label>
      </div>
    </div>
    
    <!-- Dynamic Filters -->
    <div class="space-y-sm" *ngIf="pageConfig">
      <label class="flex items-center gap-xs font-kpi-label text-kpi-label uppercase">
        <span class="material-symbols-outlined text-[18px]">filter_list</span>
        {{ currentPageName }} Filters
      </label>
      
      <div class="space-y-sm" *ngFor="let col of pageConfig.filter_columns">
        <ng-container *ngIf="dataService.filterOptions()[col]">
          <label class="text-xs font-bold text-secondary">{{ col }}</label>
          <select multiple (change)="onFilterChange(col, $event)" class="w-full bg-white border border-border-base rounded-lg px-sm py-xs text-body-main custom-scrollbar" style="max-height: 120px;">
            <option value="ALL">All (Clear Selection)</option>
            <option *ngFor="let opt of dataService.filterOptions()[col]" [value]="opt" [selected]="isFilterSelected(col, opt)">
              {{ opt }}
            </option>
          </select>
        </ng-container>
      </div>
    </div>

  </div>
</aside>

<!-- Small uncollapse button when collapsed -->
<button *ngIf="isCollapsed" (click)="toggleSidebar()" class="fixed left-0 top-[73px] bg-white border border-border-base rounded-r-lg p-1 shadow-sm hover:bg-surface-container-low z-50 mt-4">
  <span class="material-symbols-outlined text-[16px]">chevron_right</span>
</button>
