<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <title>GlobalPay AML Compliance Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Plotly -->
  <script src="assets/plotly-2.29.1.min.js"></script>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

      darkMode: "class",

        extend: {
          "colors": {
            "border-base": "#E5E5E5",

            "inverse-on-surface": "#f1f1f1",
            "secondary-fixed-dim": "#c8c6c6",
            "tertiary": "#000000",
            "on-secondary-fixed": "#1b1c1c",
            "error-container": "#ffdad6",
            "surface-container-low": "#f3f3f3",
            "risk-low": "#00CC96",
            "surface-bright": "#f9f9f9",
            "on-primary": "#ffffff",
            "surface": "#f9f9f9",
            "inverse-primary": "#c8c6c5",
            "secondary": "#5f5e5e",
            "outline": "#747878",
            "risk-medium": "#FFA15A",
            "surface-container-highest": "#e2e2e2",
            "grid-line": "#EEEEEE",
            "on-tertiary": "#ffffff",
            "on-tertiary-container": "#848484",
            "primary-fixed-dim": "#c8c6c5",
            "primary": "#000000",
            "on-error": "#ffffff",
            "on-primary-fixed": "#1c1b1b",
            "primary-container": "#1c1b1b",
            "on-error-container": "#93000a",
            "risk-high": "#EF553B",
            "secondary-fixed": "#e4e2e2",
            "inverse-surface": "#2f3131",
            "risk-unknown": "#636363",
            "surface-container": "#eeeeee",
            "on-tertiary-fixed": "#1b1c1c",
            "on-secondary-fixed-variant": "#474747",
            "tertiary-container": "#1b1c1c",
            "surface-tint": "#5f5e5e",
            "surface-variant": "#e2e2e2",
            "kpi-label": "#64748B",
            "on-surface-variant": "#444748",
            "kpi-value": "#0F172A",
            "on-secondary-container": "#656464",
            "light-ui": "#BBBBBB",
            "tertiary-fixed-dim": "#c7c6c6",
            "background": "#f9f9f9",
            "on-surface": "#1a1c1c",
            "on-primary-container": "#858383",
            "tertiary-fixed": "#e3e2e2",
            "surface-container-lowest": "#ffffff",
            "on-tertiary-fixed-variant": "#464747",
            "surface-dim": "#dadada"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "card-padding": "20px",
            "base": "4px",
            "lg": "20px",
            "sidebar-width": "280px",
            "sm": "12px",
            "xs": "8px",
            "gutter": "16px",
            "xl": "24px",
            "md": "16px"
          },
          "fontFamily": {
            "section-heading": ["Inter", "sans-serif"],
            "kpi-label": ["Inter", "sans-serif"],
            "kpi-value": ["Inter", "sans-serif"],
            "kpi-value-mobile": ["Inter", "sans-serif"],
            "nav-pill": ["Inter", "sans-serif"],
            "page-title": ["Inter", "sans-serif"],
            "body-main": ["Inter", "sans-serif"],
            "table-data": ["Inter", "sans-serif"]
          },
          "fontSize": {
            "section-heading": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
            "kpi-label": ["13px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "kpi-value": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
            "kpi-value-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
            "nav-pill": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
            "page-title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-main": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "table-data": ["13px", {"lineHeight": "18px", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #f9f9f9;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }
    .kpi-card {
      box-shadow: 0 4px 6px rgba(0,0,0,0.04);
      border: 1px solid #E5E5E5;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.06);
    }
    
    /* Make plotly charts inherit tailwind styles roughly by resetting */
    .js-plotly-plot .plotly .modebar {
      display: none !important;
    }
  </style>
</head>
<body class="text-on-surface">
  <app-root></app-root>
</body>
</html>
